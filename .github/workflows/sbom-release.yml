# M6 — Genera SBOMs (Software Bill of Materials) en cada release.
# Formatos: CycloneDX (industry standard) + SPDX (SBOM nativo de npm).
# Permite auditoría de cadena de suministro y respuesta rápida ante CVE 0-day en deps.
name: Release SBOM

on:
  release:
    types: [created]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sbom:
    name: Generar y publicar SBOMs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── PHP / Composer SBOM ──────────────────────────────────────────
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Instalar cyclonedx/cyclonedx-php-composer
        run: composer global require --dev cyclonedx/cyclonedx-php-composer

      - name: Generar SBOM Composer (CycloneDX JSON)
        working-directory: apps/api
        run: |
          composer install --no-dev --prefer-dist --no-progress
          $(composer global config bin-dir --absolute --quiet)/cyclonedx-php composer:make-sbom \
            --output-format=JSON \
            --output-file=../../sbom-api.cdx.json

      # ── Node / npm SBOM ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Generar SBOM npm (SPDX nativo)
        working-directory: apps/web
        run: |
          npm ci --legacy-peer-deps
          npm sbom --sbom-format=spdx > ../../sbom-web.spdx.json

      - name: Generar SBOM npm (CycloneDX adicional)
        working-directory: apps/web
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ../../sbom-web.cdx.json

      # ── Adjuntar al release ──────────────────────────────────────────
      - name: Adjuntar SBOMs al release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-api.cdx.json
            sbom-web.spdx.json
            sbom-web.cdx.json
          fail_on_unmatched_files: true

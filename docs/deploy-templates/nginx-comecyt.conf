# =============================================================================
# nginx — COMECYT Sistema de Gestión
# =============================================================================
# Ubicación: /etc/nginx/sites-available/comecyt
# Activar:   sudo ln -s /etc/nginx/sites-available/comecyt /etc/nginx/sites-enabled/
# SSL:       sudo certbot --nginx -d dominio.gob.mx
#
# IMPORTANTE: reemplazar `tudominio.gob.mx` con tu dominio real ANTES de cargar.
# =============================================================================

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.gob.mx www.tudominio.gob.mx;
    return 301 https://$host$request_uri;
}

# ─── Servidor principal HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.gob.mx www.tudominio.gob.mx;

    # SSL — Certbot completará estos paths:
    # ssl_certificate /etc/letsencrypt/live/tudominio.gob.mx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.gob.mx/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ────────────────────────────────────────────────────
    # CSP la setea Next.js (más granular). Aquí los headers globales.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ─── Tamaños y timeouts ──────────────────────────────────────────────────
    client_max_body_size 8M;
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ─── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ─── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/comecyt-access.log;
    error_log  /var/log/nginx/comecyt-error.log warn;

    # ─── API Laravel (php-fpm) ───────────────────────────────────────────────
    # Toda la ruta /api/* va al backend Laravel via php-fpm
    location ^~ /api/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Pass real client IP a Laravel
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Para que `try_files ... /index.php?...` funcione bien:
    root /var/www/comecyt/apps/api/public;

    location ~ ^/api/.*\.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/comecyt/apps/api/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/comecyt/apps/api/public;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 32k;
        fastcgi_buffer_size 64k;

        # Pasar headers para JWT cookie
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    }

    # ─── Storage público (uploads documentos + imágenes carrusel) ────────────
    location /storage/ {
        alias /var/www/comecyt/apps/api/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        # Forzar download para PDFs (evita renderizado inline)
        location ~* \.(pdf|doc|docx|xls|xlsx)$ {
            add_header Content-Disposition "attachment" always;
        }
    }

    # ─── WebSocket Reverb (notificaciones en tiempo real) ────────────────────
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── Next.js (todo lo demás: app + rutas SPA) ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Cache de assets estáticos de Next.js ────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Bloquear acceso a archivos sensibles ────────────────────────────────
    location ~ /\.(env|git|htaccess|gitignore|gitmodules) {
        deny all;
        return 404;
    }
    location ~ /(composer\.(json|lock)|package(-lock)?\.json|artisan|deploy\.sh) {
        deny all;
        return 404;
    }
    location ~ /(storage/logs|storage/framework) {
        deny all;
        return 404;
    }

    # ─── Favicon y robots ────────────────────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
        # Si no quieres que indexen tu sistema institucional:
        # add_header Content-Type "text/plain";
        # return 200 "User-agent: *\nDisallow: /\n";
    }
}

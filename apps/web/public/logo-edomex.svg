<?xml version="1.0" encoding="UTF-8"?>
<!--
  Marca institucional minimalista — Gobierno del Estado de México.
  Esta es una representación tipográfica sobria pensada como default mientras
  la institución provee el escudo oficial vectorial (alta resolución).
  Para reemplazar:  setear NEXT_PUBLIC_EDOMEX_LOGO_URL apuntando al asset oficial,
  o sustituir este archivo por el SVG/PNG provisto por la dirección de comunicación.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 160"
     width="240"
     height="160"
     role="img"
     aria-label="Gobierno del Estado de México">
  <title>Gobierno del Estado de México</title>

  <defs>
    <linearGradient id="emxBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006847"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CE1126"/>
    </linearGradient>
  </defs>

  <!-- Banda tricolor superior -->
  <rect x="0" y="0" width="240" height="6" fill="url(#emxBand)"/>

  <!-- Bloque institucional -->
  <g transform="translate(120, 92)" text-anchor="middle"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#1B1B1B">
    <text y="-32" font-size="11" font-weight="600" letter-spacing="3.5">GOBIERNO DEL</text>
    <text y="-12" font-size="22" font-weight="800" letter-spacing="1.5">ESTADO DE MÉXICO</text>
    <line x1="-58" y1="2" x2="58" y2="2" stroke="#006847" stroke-width="1.5"/>
    <text y="22" font-size="9" font-weight="500" letter-spacing="4" fill="#5A5A5A">ADMINISTRACIÓN PÚBLICA</text>
  </g>

  <!-- Banda tricolor inferior (versión sutil) -->
  <rect x="0" y="154" width="240" height="6" fill="url(#emxBand)" opacity="0.65"/>
</svg>
